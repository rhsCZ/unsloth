---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      actions:
        patterns: ["*"]
      actions-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "bun"
    directory: "/studio/frontend"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      bun-frontend:
        patterns: ["*"]
      bun-frontend-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/studio/backend/core/data_recipe/oxc-validator"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      npm-oxc-validator:
        patterns: ["*"]
      npm-oxc-validator-security:
        applies-to: security-updates
        patterns: ["*"]

  # pip + cargo grouped weekly; the *-security siblings batch
  # advisories that would otherwise each open their own PR.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
      python-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/studio/src-tauri"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      cargo-tauri:
        patterns: ["*"]
      cargo-tauri-security:
        applies-to: security-updates
        patterns: ["*"]

  # bun owns version updates for /studio/frontend (above); GitHub
  # fires npm-package advisories under npm_and_yarn, so this entry
  # catches and groups them. limit: 0 suppresses version-update
  # PRs, security updates flow through regardless. The cooldown
  # below applies to those security PRs: even when the advisory
  # arrives we wait the standard window so we never ingest a
  # tarball that was hot-published less than 3 days ago.
  - package-ecosystem: "npm"
    directory: "/studio/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      npm-frontend-security:
        applies-to: security-updates
        patterns: ["*"]
...
