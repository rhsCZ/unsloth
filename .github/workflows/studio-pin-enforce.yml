# Guards against re-introducing caret ranges on the @assistant-ui surface
# while those packages are still pre-1.0 (every minor on 0.x is a SemVer-major).
# Caret ranges on this surface are exactly what produced the 2026.5.1 chat-history
# regression: package.json had ^0.12.19, fresh installs resolved 0.12.28, the
# new _RuntimeBinder ordering broke the unstable_Provider adapter wiring.

name: Studio pin enforcement

on:
  pull_request:
    paths:
      - 'studio/frontend/package.json'
      - '.github/workflows/studio-pin-enforce.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: '@assistant-ui must be pinned exactly'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Forbid carets/tildes on @assistant-ui/* and assistant-stream
        run: |
          set -e
          if grep -nE '"(@assistant-ui/[a-z-]+|assistant-stream)":[[:space:]]*"[\^~]' studio/frontend/package.json; then
            echo "::error file=studio/frontend/package.json::These packages must be pinned to exact versions until they leave 0.x. Drop the leading ^ or ~."
            exit 1
          fi
          echo "All assistant-ui packages are pinned exactly."
